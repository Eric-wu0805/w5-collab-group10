<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>我們組的 Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <header>
      <!-- 組長任務：把標題改成你們組的名字 -->
      <h1>🤖 第10組的 Chatbot</h1>
      <p class="subtitle">W5 PR 協作練習</p>
    </header>

    <!-- 組員 A 任務：在 .message 裡加上時間戳 span -->
    <!-- 組員 C 任務：在 header 下方加字數統計 p 元素 -->
    <p id="word-count">目前字數：0</p>

    <!-- 組員 D 任務：在 header 加深色模式切換按鈕 -->
    <button id="theme-toggle" onclick="toggleDarkMode()">🌓 切換模式</button>


    <div class="search-area">
      <input id="search-input" type="text" placeholder="搜尋對話紀錄..." oninput="searchMessages()">
    </div>

    <div id="chat-box">
      <div class="message bot">
        嗨！這是我們組用 PR 協作做出來的 Chatbot 🎉
        <span class="timestamp">🕐 剛剛</span>
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="輸入訊息...">
      <input type="file" id="sticker-input" accept="image/*" style="display: none;" onchange="sendSticker(event)">
      <button onclick="document.getElementById('sticker-input').click()">貼圖</button>
      <button onclick="sendMessage()">送出</button>
      <!-- 組員 B 任務：在這裡加清除按鈕 -->
    </div>

    <!-- 組員 E 任務：在這裡加鍵盤快捷鍵說明 -->
    <footer></footer>
  </div>

  <script>
    let totalChars = 0;

    function sendSticker(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const chatBox = document.getElementById('chat-box');
        
        const userDiv = document.createElement('div');
        userDiv.className = 'message user sticker-message';
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'sticker';
        userDiv.appendChild(img);
        chatBox.appendChild(userDiv);

        const botDiv = document.createElement('div');
        botDiv.className = 'message bot';
        botDiv.textContent = '收到貼圖！';
        chatBox.appendChild(botDiv);

        chatBox.scrollTop = chatBox.scrollHeight;
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    }

    function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      // 組員 A 任務：在這裡加入時間戳
      const now = new Date();
      const hours = now.getHours();
      const period = hours < 12 ? '上午' : '下午';
      const h12 = (hours % 12 || 12).toString().padStart(2, '0');
      const timeStr = period + ' ' + h12 + ':' + now.getMinutes().toString().padStart(2, '0');
      userDiv.textContent = text;
      const timestamp = document.createElement('span');
      timestamp.className = 'timestamp';
      timestamp.textContent = timeStr;
      userDiv.appendChild(timestamp);
      chatBox.appendChild(userDiv);

      const botDiv = document.createElement('div');
      botDiv.className = 'message bot';
      botDiv.textContent = `你說了「${text}」！`;
      const botTimestamp = document.createElement('span');
      botTimestamp.className = 'timestamp';
      botTimestamp.textContent = timeStr;
      botDiv.appendChild(botTimestamp);
      chatBox.appendChild(botDiv);

      totalChars += text.length;
      input.value = '';
      document.getElementById('word-count').textContent = `目前字數：${totalChars}`;
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });

    // 組員 B 任務：在這裡加 clearChat() 函數
    // 組員 C 任務：在這裡加字數統計更新邏輯
    document.getElementById('user-input').addEventListener('input', function() {
      const currentCount = this.value.length;
      document.getElementById('word-count').textContent = `目前字數：${totalChars + currentCount}`;
    });

    // 組員 D 任務：在這裡加深色模式切換函數
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
    }

    function searchMessages() {
      const searchText = document.getElementById('search-input').value.toLowerCase();
      const messages = document.querySelectorAll('.message');

      messages.forEach(msg => {
        if (msg.textContent.toLowerCase().includes(searchText)) {
          msg.style.display = '';
        } else {
          msg.style.display = 'none';
        }
      });
    }
  </script>

</body>

</html>
